name: Multi Agent Docker Build & Push - Kube Agent + OpsAI + Synthetics

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for Docker image'
        required: true
      platform:
        description: 'Platform to build the Docker image for (amd64, arm64, or both)'
        required: true
        default: 'both'
  push:
    paths-ignore:
      - '.github/**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build_and_push:
    name: Build & Push Docker Images (Matrix)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent:
          - name: kube-agent
            binary: mw-kube-agent
            dockerfile: Dockerfiles/DockerfileKube.base
            image: ghcr.io/middleware-labs/mw-kube-agent
          - name: opsai
            binary: mw-opsai
            dockerfile: Dockerfiles/DockerfileKube.base
            image: ghcr.io/middleware-labs/mw-opsai
          - name: synthetics
            binary: mw-synthetics
            dockerfile: Dockerfiles/DockerfileKube.base
            image: ghcr.io/middleware-labs/mw-synthetics
    steps:

      - name: Debug Inputs
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Tag input: '${{ github.event.inputs.tag }}'"
          echo "Platform input: '${{ github.event.inputs.platform }}'"
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "GITHUB_SHA: ${{ github.sha }}"


      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          ssh-key: ${{ secrets.CHECK_AGENT_ACCESS }}
          submodules: 'recursive'
      
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          echo "Available disk space:"
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.agent.image }}

      - name: Setting Release Number
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
            echo "Using manual tag: ${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
            echo "Using git tag: ${GITHUB_REF#refs/tags/}"
          else
            BRANCH=$(echo "${{ github.ref }}" | sed 's|refs/heads/||' | sed 's|/|-|g')
            SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "RELEASE_VERSION=${BRANCH}-${SHA_SHORT}" >> $GITHUB_ENV
            echo "Using branch+SHA: ${BRANCH}-${SHA_SHORT}"
          fi

      - name: Setting Platforms
        id: set-platforms
        run: |
          if [[ "${{ github.event.inputs.platform }}" == "amd64" ]]; then
            echo "PLATFORMS=linux/amd64" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.platform }}" == "arm64" ]]; then
            echo "PLATFORMS=linux/arm64" >> $GITHUB_ENV
          else
            echo "PLATFORMS=linux/amd64,linux/arm64" >> $GITHUB_ENV
          fi

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ${{ matrix.agent.dockerfile }}
          push: true
          platforms: ${{ env.PLATFORMS }}
          cache-from: type=gha,scope=${{ matrix.agent.name }}
          cache-to: type=gha,scope=${{ matrix.agent.name }},mode=max
          secrets: |
            GITHUB_TOKEN=${{ secrets.GHCR_TOKEN }}
          build-args: |
            AGENT_VERSION=${{ env.RELEASE_VERSION }}
            APP_BINARY=${{ matrix.agent.binary }}
          tags: |
            ${{ matrix.agent.image }}:${{ env.RELEASE_VERSION }}
      
      - name: Clean Up Docker
        if: always()
        run: |
          docker system prune -af --volumes
          df -h
